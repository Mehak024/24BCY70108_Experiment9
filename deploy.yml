##############################################################
# .github/workflows/deploy.yml
#
# Trigger: push to main branch
#
# Steps:
#   1. Run tests
#   2. Build Docker image
#   3. Push image to ECR (tagged with git SHA + "latest")
#   4. Update ECS service (rolling deployment)
#
# Required GitHub Secrets:
#   AWS_ACCOUNT_ID        — your 12-digit AWS account ID
#   AWS_REGION            — e.g. us-east-1
#   AWS_ROLE_ARN          — IAM role the workflow assumes (OIDC)
#   ECS_CLUSTER_NAME      — value of terraform output ecs_cluster_name
#   ECS_SERVICE_NAME      — value of terraform output ecs_service_name
#   ECS_TASK_FAMILY       — e.g. myapp-prod-task
#   ECR_REPOSITORY        — e.g. myapp-prod-app
#   CONTAINER_NAME        — must match container name in task def
##############################################################

name: Build and Deploy to ECS

on:
  push:
    branches: [main]
  workflow_dispatch: # Allow manual trigger from GitHub UI

permissions:
  id-token: write  # Required for OIDC auth with AWS
  contents: read

env:
  AWS_REGION: ${{ secrets.AWS_REGION }}
  ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ secrets.AWS_REGION }}.amazonaws.com

jobs:
  # ──────────────────────────────────────────────────────────
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --frozen-lockfile

      - name: Run unit tests
        run: npm test

      - name: Run lint
        run: npm run lint

  # ──────────────────────────────────────────────────────────
  build-and-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    needs: test
    environment: production

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      # ── AWS credentials via OIDC (no long-lived keys!) ────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}
          role-session-name: GitHubActions-${{ github.run_id }}

      # ── Log in to ECR ─────────────────────────────────────
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      # ── Build & push Docker image ─────────────────────────
      - name: Set image tag
        id: image-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "tag=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_uri=${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        run: |
          docker build \
            --file app/Dockerfile \
            --tag ${{ steps.image-tag.outputs.full_uri }} \
            --tag ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest \
            --build-arg BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ') \
            --build-arg GIT_SHA=${{ github.sha }} \
            --cache-from ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest \
            app/

      - name: Push image to ECR
        run: |
          docker push ${{ steps.image-tag.outputs.full_uri }}
          docker push ${{ env.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest

      # ── Update ECS task definition with new image ─────────
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ secrets.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ secrets.CONTAINER_NAME }}
          image:            ${{ steps.image-tag.outputs.full_uri }}

      # ── Rolling deploy to ECS ─────────────────────────────
      - name: Deploy to ECS service (rolling update)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v1
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ secrets.ECS_SERVICE_NAME }}
          cluster:                  ${{ secrets.ECS_CLUSTER_NAME }}
          wait-for-service-stability: true    # Block until deploy completes
          wait-for-minutes:         10

      # ── Notify on failure ─────────────────────────────────
      - name: Notify on deploy failure
        if: failure()
        run: |
          echo "::error::Deployment failed for commit ${{ github.sha }}"
          # Plug in Slack / PagerDuty / SNS notification here

  # ──────────────────────────────────────────────────────────
  # Optional: run smoke tests against the live ALB endpoint
  # after deployment.
  # ──────────────────────────────────────────────────────────
  smoke-test:
    name: Smoke Tests
    runs-on: ubuntu-latest
    needs: build-and-deploy
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Get ALB DNS
        id: alb
        run: |
          DNS=$(aws elbv2 describe-load-balancers \
            --names "myapp-prod-alb" \
            --query "LoadBalancers[0].DNSName" \
            --output text)
          echo "dns=$DNS" >> "$GITHUB_OUTPUT"

      - name: Health check
        run: |
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://${{ steps.alb.outputs.dns }}/health)
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 10s..."
            sleep 10
          done
          echo "Health check failed after 3 attempts"
          exit 1
